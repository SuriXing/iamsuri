<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suri's Lab — 3D World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    background: #1a1a2e;
    font-family: 'Courier New', monospace;
  }
  canvas { display: block; }

  #loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a2e; color: #ffd700;
    font-family: 'Courier New', monospace; font-size: 1.2rem;
    z-index: 100; transition: opacity 0.6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading .spinner {
    width: 24px; height: 24px; border: 3px solid #333;
    border-top-color: #ffd700; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #overlay {
    position: fixed; top: 28px; left: 32px; z-index: 10;
    pointer-events: none; user-select: none;
  }
  #overlay h1 {
    font-size: 2rem; color: #ffd700; letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(255,215,0,0.6), 0 0 40px rgba(255,215,0,0.2);
  }
  #overlay p {
    font-size: 0.85rem; color: #e5e7eb; opacity: 0.7;
    margin-top: 4px; letter-spacing: 1px;
  }

  .room-label {
    position: fixed; z-index: 10; pointer-events: none;
    font-family: 'Courier New', monospace; font-size: 0.7rem;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 3px;
    background: rgba(20,23,34,0.75); backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.08);
  }
  #label-myroom    { color: #a78bfa; }
  #label-product   { color: #60a5fa; }
  #label-book      { color: #4ade80; }
  #label-idealab   { color: #fbbf24; }

  #hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 10; color: #e5e7eb; opacity: 0.35; font-size: 0.7rem;
    font-family: 'Courier New', monospace; letter-spacing: 1px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div>Initializing world…</div>

<div id="overlay">
  <h1>Suri's Lab</h1>
  <p>A 3D Explorable World</p>
</div>

<div id="label-myroom" class="room-label">My Room</div>
<div id="label-product" class="room-label">Product Room</div>
<div id="label-book" class="room-label">Book Room</div>
<div id="label-idealab" class="room-label">Idea Lab</div>

<div id="hint">scroll to zoom · drag to orbit</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
(function() {
  'use strict';

  // ── Renderer ──────────────────────────────────────────────
  var renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.setClearColor(0x1a1a2e);
  document.body.appendChild(renderer.domElement);

  var scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x1a1a2e, 0.004);

  var animatables = { liveDots: [], steamCubes: [], ideaBulb: null, ideaBulbLight: null, scanline: null };

  // ── Camera ────────────────────────────────────────────────
  var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(14, 16, 14);
  camera.lookAt(0, 0, 0);

  // ── Lights ────────────────────────────────────────────────
  var ambient = new THREE.AmbientLight(0x8888aa, 1.2);
  scene.add(ambient);

  var dirLight = new THREE.DirectionalLight(0xffd700, 1.2);
  dirLight.position.set(-10, 18, 8);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(2048, 2048);
  dirLight.shadow.camera.left = -20;
  dirLight.shadow.camera.right = 20;
  dirLight.shadow.camera.top = 20;
  dirLight.shadow.camera.bottom = -20;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 50;
  dirLight.shadow.bias = -0.001;
  scene.add(dirLight);

  var pointGreen = new THREE.PointLight(0x22c55e, 0.5, 30);
  pointGreen.position.set(0, 3, 0);
  scene.add(pointGreen);

  // Subtle rim lights for depth
  var rimLight1 = new THREE.PointLight(0xe94560, 0.4, 30);
  rimLight1.position.set(-8, 5, -8);
  scene.add(rimLight1);

  var rimLight2 = new THREE.PointLight(0x3b82f6, 0.4, 30);
  rimLight2.position.set(8, 5, -8);
  scene.add(rimLight2);

  // ── Helpers ───────────────────────────────────────────────
  function mat(color, opts) {
    var params = { color: color, flatShading: true };
    if (opts) {
      if (opts.emissive) params.emissive = opts.emissive;
      if (opts.emissiveIntensity !== undefined) params.emissiveIntensity = opts.emissiveIntensity;
      if (opts.transparent) params.transparent = true;
      if (opts.opacity !== undefined) params.opacity = opts.opacity;
      if (opts.flatShading) params.flatShading = true;
    }
    return new THREE.MeshPhongMaterial(params);
  }

  function box(w, h, d, material) {
    var m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
    m.castShadow = true;
    m.receiveShadow = true;
    return m;
  }

  function cyl(rTop, rBot, h, segs, material) {
    var m = new THREE.Mesh(new THREE.CylinderGeometry(rTop, rBot, h, segs || 8), material);
    m.castShadow = true;
    m.receiveShadow = true;
    return m;
  }

  // ── Layout constants ──────────────────────────────────────
  var ROOM = 5;        // room half-size
  var GAP = 1.2;       // hallway half-width
  var FLOOR_Y = 0.06;
  var cx = {
    tl: { x: -(ROOM/2 + GAP), z: -(ROOM/2 + GAP) },
    tr: { x:  (ROOM/2 + GAP), z: -(ROOM/2 + GAP) },
    bl: { x: -(ROOM/2 + GAP), z:  (ROOM/2 + GAP) },
    br: { x:  (ROOM/2 + GAP), z:  (ROOM/2 + GAP) },
  };

  // Per-room warm overhead lights
  [{x: cx.tl.x, z: cx.tl.z, c: 0xa78bfa}, {x: cx.tr.x, z: cx.tr.z, c: 0x60a5fa},
   {x: cx.bl.x, z: cx.bl.z, c: 0x4ade80}, {x: cx.br.x, z: cx.br.z, c: 0xfbbf24}].forEach(function(r) {
    var roomLight = new THREE.PointLight(r.c, 0.6, 10);
    roomLight.position.set(r.x, 4, r.z);
    scene.add(roomLight);
  });

  // ── Ground ────────────────────────────────────────────────
  var groundGeo = new THREE.PlaneGeometry(30, 30);
  var groundMat = new THREE.MeshPhongMaterial({ color: 0x111827 });
  var ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.01;
  ground.receiveShadow = true;
  scene.add(ground);

  // ── Room Floor Tiles ──────────────────────────────────────
  function roomFloor(color, x, z, opacity) {
    var m = box(ROOM, 0.12, ROOM, mat(color, {
      transparent: opacity < 1, opacity: opacity,
      emissive: color, emissiveIntensity: 0.3
    }));
    m.position.set(x, FLOOR_Y, z);
    m.receiveShadow = true;
    scene.add(m);
    // border glow line
    var edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(ROOM, 0.12, ROOM));
    var line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.5 }));
    line.position.copy(m.position);
    scene.add(line);
    return m;
  }

  roomFloor(0x64477d, cx.tl.x, cx.tl.z, 0.85);
  roomFloor(0x3b82f6, cx.tr.x, cx.tr.z, 0.8);
  roomFloor(0x22c55e, cx.bl.x, cx.bl.z, 0.55);
  roomFloor(0xffd700, cx.br.x, cx.br.z, 0.5);

  // Hallway cross
  var hallMat = mat(0x1e2233, { emissive: 0x1e2233, emissiveIntensity: 0.1 });
  var hallH = box(GAP * 2, 0.08, ROOM * 2 + GAP * 2 + 1, hallMat);
  hallH.position.y = FLOOR_Y - 0.02;
  hallH.receiveShadow = true;
  scene.add(hallH);
  var hallV = box(ROOM * 2 + GAP * 2 + 1, 0.08, GAP * 2, hallMat);
  hallV.position.y = FLOOR_Y - 0.02;
  hallV.receiveShadow = true;
  scene.add(hallV);

  // Thin wall borders between rooms
  function wallStrip(x, z, w, d) {
    var s = box(w, 1.8, d, mat(0x1e2233, { emissive: 0x64477d, emissiveIntensity: 0.08 }));
    s.position.set(x, 1.0, z);
    scene.add(s);
  }
  // Horizontal dividers
  wallStrip(-(ROOM/2 + GAP), GAP + 0.05, ROOM + 0.2, 0.1);
  wallStrip(-(ROOM/2 + GAP), -(GAP + 0.05), ROOM + 0.2, 0.1);
  wallStrip((ROOM/2 + GAP), GAP + 0.05, ROOM + 0.2, 0.1);
  wallStrip((ROOM/2 + GAP), -(GAP + 0.05), ROOM + 0.2, 0.1);
  // Vertical dividers
  wallStrip(GAP + 0.05, -(ROOM/2 + GAP), 0.1, ROOM + 0.2);
  wallStrip(-(GAP + 0.05), -(ROOM/2 + GAP), 0.1, ROOM + 0.2);
  wallStrip(GAP + 0.05, (ROOM/2 + GAP), 0.1, ROOM + 0.2);
  wallStrip(-(GAP + 0.05), (ROOM/2 + GAP), 0.1, ROOM + 0.2);

  // ── MY ROOM (top-left, purple) ────────────────────────────
  (function() {
    var ox = cx.tl.x, oz = cx.tl.z;

    // Desk
    var deskTop = box(2.2, 0.12, 1.1, mat(0x8B4513));
    deskTop.position.set(ox - 0.3, 0.7, oz - 0.5);
    scene.add(deskTop);
    // Legs
    [[-1, -0.4], [1, -0.4], [-1, 0.4], [1, 0.4]].forEach(function(p) {
      var leg = box(0.08, 0.58, 0.08, mat(0x6b3410));
      leg.position.set(ox - 0.3 + p[0], 0.35, oz - 0.5 + p[1]);
      scene.add(leg);
    });

    // Monitor
    var monFrame = box(1.2, 0.8, 0.06, mat(0x222222));
    monFrame.position.set(ox - 0.3, 1.2, oz - 0.9);
    scene.add(monFrame);
    var monScreen = box(1.0, 0.6, 0.02, mat(0x1a1a3e, { emissive: 0x4466ff, emissiveIntensity: 2.0 }));
    monScreen.position.set(ox - 0.3, 1.22, oz - 0.87);
    scene.add(monScreen);
    // Monitor stand
    var stand = box(0.08, 0.38, 0.08, mat(0x333333));
    stand.position.set(ox - 0.3, 0.9, oz - 0.85);
    scene.add(stand);
    // Screen scanline effect (subtle glowing bar)
    var scanline = box(0.95, 0.02, 0.01, mat(0x6699ff, { emissive: 0x6699ff, emissiveIntensity: 3.0 }));
    scanline.position.set(ox - 0.3, 1.22, oz - 0.85);
    scene.add(scanline);
    animatables.scanline = scanline;

    // Keyboard
    var kb = box(0.7, 0.03, 0.25, mat(0x333333, { emissive: 0x22c55e, emissiveIntensity: 0.1 }));
    kb.position.set(ox - 0.3, 0.78, oz - 0.2);
    scene.add(kb);

    // Chair
    var seat = box(0.7, 0.08, 0.7, mat(0x444444));
    seat.position.set(ox - 0.3, 0.45, oz + 0.3);
    scene.add(seat);
    var back = box(0.7, 0.6, 0.08, mat(0x555555));
    back.position.set(ox - 0.3, 0.75, oz + 0.62);
    scene.add(back);
    // Chair legs
    [[-0.25, -0.25], [0.25, -0.25], [-0.25, 0.25], [0.25, 0.25]].forEach(function(p) {
      var cl = cyl(0.03, 0.03, 0.35, 6, mat(0x333333));
      cl.position.set(ox - 0.3 + p[0], 0.22, oz + 0.3 + p[1]);
      scene.add(cl);
    });

    // Bookshelf on "wall" side
    var shelfX = ox + 1.8;
    [0.4, 0.85, 1.3].forEach(function(y) {
      var plank = box(1.2, 0.06, 0.35, mat(0x8B4513));
      plank.position.set(shelfX, y, oz - 0.8);
      scene.add(plank);
      // Books
      var colors = [0xe94560, 0x3b82f6, 0xffd700, 0x22c55e, 0xa78bfa];
      for (var i = 0; i < 4; i++) {
        var book = box(0.08, 0.2 + Math.random() * 0.1, 0.25, mat(colors[i % colors.length]));
        book.position.set(shelfX - 0.35 + i * 0.22, y + 0.16, oz - 0.8);
        scene.add(book);
      }
    });
    // Shelf back
    var shelfBack = box(0.06, 1.2, 0.35, mat(0x6b3410));
    shelfBack.position.set(shelfX + 0.6, 0.7, oz - 0.8);
    scene.add(shelfBack);

    // Desk lamp
    var lampBase = cyl(0.12, 0.15, 0.06, 8, mat(0x333333));
    lampBase.position.set(ox + 0.7, 0.79, oz - 0.8);
    scene.add(lampBase);
    var lampArm = cyl(0.02, 0.02, 0.5, 6, mat(0x555555));
    lampArm.position.set(ox + 0.7, 1.04, oz - 0.8);
    scene.add(lampArm);
    var lampHead = box(0.18, 0.08, 0.12, mat(0xffd700, { emissive: 0xffd700, emissiveIntensity: 1.5 }));
    lampHead.position.set(ox + 0.7, 1.32, oz - 0.8);
    scene.add(lampHead);
    var lampGlow = new THREE.PointLight(0xffd700, 0.8, 8);
    lampGlow.position.set(ox + 0.7, 1.25, oz - 0.8);
    scene.add(lampGlow);

    // Small rug
    var rug = box(1.5, 0.02, 1.0, mat(0x64477d, { emissive: 0x64477d, emissiveIntensity: 0.2 }));
    rug.position.set(ox - 0.3, 0.13, oz + 0.1);
    scene.add(rug);
  })();

  // ── PRODUCT ROOM (top-right, blue) ────────────────────────
  (function() {
    var ox = cx.tr.x, oz = cx.tr.z;

    // Stage platform
    var stage = box(3.5, 0.15, 2.5, mat(0x1e293b, { emissive: 0x3b82f6, emissiveIntensity: 0.08 }));
    stage.position.set(ox, 0.2, oz - 0.3);
    scene.add(stage);

    // Display stand 1
    var ped1 = box(0.3, 1.4, 0.3, mat(0xcccccc));
    ped1.position.set(ox - 0.9, 0.9, oz - 0.3);
    scene.add(ped1);
    var screen1Frame = box(1.0, 0.7, 0.06, mat(0x222222));
    screen1Frame.position.set(ox - 0.9, 1.9, oz - 0.3);
    scene.add(screen1Frame);
    var screen1 = box(0.85, 0.55, 0.02, mat(0x112211, { emissive: 0x22c55e, emissiveIntensity: 2.5 }));
    screen1.position.set(ox - 0.9, 1.92, oz - 0.27);
    scene.add(screen1);
    // "LIVE" indicator dot
    var liveDot1 = box(0.06, 0.06, 0.02, mat(0x22c55e, { emissive: 0x22c55e, emissiveIntensity: 4.0 }));
    liveDot1.position.set(ox - 0.5, 2.18, oz - 0.25);
    scene.add(liveDot1);

    // Display stand 2
    var ped2 = box(0.3, 1.4, 0.3, mat(0xcccccc));
    ped2.position.set(ox + 0.9, 0.9, oz - 0.3);
    scene.add(ped2);
    var screen2Frame = box(1.0, 0.7, 0.06, mat(0x222222));
    screen2Frame.position.set(ox + 0.9, 1.9, oz - 0.3);
    scene.add(screen2Frame);
    var screen2 = box(0.85, 0.55, 0.02, mat(0x112211, { emissive: 0x22c55e, emissiveIntensity: 2.5 }));
    screen2.position.set(ox + 0.9, 1.92, oz - 0.27);
    scene.add(screen2);
    var liveDot2 = box(0.06, 0.06, 0.02, mat(0x22c55e, { emissive: 0x22c55e, emissiveIntensity: 4.0 }));
    liveDot2.position.set(ox + 1.3, 2.18, oz - 0.25);
    scene.add(liveDot2);
    animatables.liveDots.push(liveDot1, liveDot2);

    // Product display table
    var table = box(2.0, 0.08, 0.8, mat(0x334155));
    table.position.set(ox, 0.55, oz + 1.0);
    scene.add(table);
    [[-0.8, -0.3], [0.8, -0.3], [-0.8, 0.3], [0.8, 0.3]].forEach(function(p) {
      var tl = cyl(0.04, 0.04, 0.42, 6, mat(0x555555));
      tl.position.set(ox + p[0], 0.34, oz + 1.0 + p[1]);
      scene.add(tl);
    });

    // Small product cubes on table
    var prodColors = [0xe94560, 0xffd700, 0x22c55e];
    prodColors.forEach(function(c, i) {
      var cube = box(0.2, 0.2, 0.2, mat(c, { emissive: c, emissiveIntensity: 0.4 }));
      cube.position.set(ox - 0.5 + i * 0.5, 0.72, oz + 1.0);
      cube.rotation.y = Math.PI / 6 * i;
      scene.add(cube);
    });

    // Glow light under stage
    var stageGlow = new THREE.PointLight(0x3b82f6, 0.6, 10);
    stageGlow.position.set(ox, 0.3, oz);
    scene.add(stageGlow);
  })();

  // ── BOOK ROOM (bottom-left, green) ────────────────────────
  (function() {
    var ox = cx.bl.x, oz = cx.bl.z;

    // Bookshelf 1 (tall, against wall)
    function makeBookshelf(bx, bz) {
      // Frame
      var frame = box(1.6, 2.0, 0.4, mat(0x6b3410));
      frame.position.set(bx, 1.1, bz);
      scene.add(frame);
      // Shelves
      for (var row = 0; row < 4; row++) {
        var shelf = box(1.5, 0.05, 0.38, mat(0x8B4513));
        shelf.position.set(bx, 0.3 + row * 0.5, bz);
        scene.add(shelf);
        // Books
        var bookColors = [0xe94560, 0x3b82f6, 0xffd700, 0x22c55e, 0xa78bfa, 0xf97316];
        for (var b = 0; b < 5; b++) {
          var bk = box(0.1, 0.3 + Math.random() * 0.12, 0.28, mat(bookColors[(row * 3 + b) % bookColors.length]));
          bk.position.set(bx - 0.55 + b * 0.26, 0.5 + row * 0.5, bz);
          scene.add(bk);
        }
      }
    }
    makeBookshelf(ox - 0.8, oz - 1.0);
    makeBookshelf(ox + 1.0, oz - 1.0);

    // Reading chair
    var rSeat = box(0.8, 0.1, 0.8, mat(0x4a3728));
    rSeat.position.set(ox - 0.5, 0.35, oz + 1.0);
    scene.add(rSeat);
    var rBack = box(0.8, 0.5, 0.1, mat(0x5a4738));
    rBack.position.set(ox - 0.5, 0.6, oz + 1.38);
    scene.add(rBack);
    // Armrests
    var armL = box(0.08, 0.25, 0.7, mat(0x5a4738));
    armL.position.set(ox - 0.88, 0.52, oz + 1.0);
    scene.add(armL);
    var armR = box(0.08, 0.25, 0.7, mat(0x5a4738));
    armR.position.set(ox - 0.12, 0.52, oz + 1.0);
    scene.add(armR);

    // Reading lamp
    var lampStem = cyl(0.03, 0.04, 1.2, 6, mat(0x888888));
    lampStem.position.set(ox + 0.5, 0.72, oz + 1.0);
    scene.add(lampStem);
    var lampShade = cyl(0.02, 0.2, 0.18, 8, mat(0xffd700, { emissive: 0xffd700, emissiveIntensity: 1.5 }));
    lampShade.position.set(ox + 0.5, 1.38, oz + 1.0);
    scene.add(lampShade);
    var readLight = new THREE.PointLight(0xffeebb, 0.8, 8);
    readLight.position.set(ox + 0.5, 1.3, oz + 1.0);
    scene.add(readLight);

    // Small side table
    var sideTop = box(0.5, 0.05, 0.5, mat(0x8B4513));
    sideTop.position.set(ox + 0.5, 0.5, oz + 1.0);
    scene.add(sideTop);
    var sideLeg = cyl(0.04, 0.04, 0.4, 6, mat(0x6b3410));
    sideLeg.position.set(ox + 0.5, 0.28, oz + 1.0);
    scene.add(sideLeg);

    // Coffee cup on side table
    var cup = cyl(0.06, 0.05, 0.1, 8, mat(0xdddddd));
    cup.position.set(ox + 0.5, 0.58, oz + 1.0);
    scene.add(cup);
    // Coffee liquid
    var coffee = cyl(0.05, 0.05, 0.02, 8, mat(0x4a2c0a));
    coffee.position.set(ox + 0.5, 0.62, oz + 1.0);
    scene.add(coffee);

    // Rug
    var rug = box(2.5, 0.02, 1.5, mat(0x22c55e, { transparent: true, opacity: 0.2, emissive: 0x22c55e, emissiveIntensity: 0.1 }));
    rug.position.set(ox, 0.13, oz + 0.5);
    scene.add(rug);
  })();

  // ── IDEA LAB (bottom-right, yellow) ───────────────────────
  (function() {
    var ox = cx.br.x, oz = cx.br.z;

    // Whiteboard
    var wbFrame = box(2.2, 1.5, 0.1, mat(0x888888));
    wbFrame.position.set(ox, 1.1, oz - 1.8);
    scene.add(wbFrame);
    var wbFace = box(2.0, 1.3, 0.02, mat(0xeeeeee));
    wbFace.position.set(ox, 1.1, oz - 1.73);
    scene.add(wbFace);

    // Sticky notes on whiteboard
    var stickyColors = [
      { c: 0xffd700, x: -0.5, y: 1.3 },
      { c: 0xf472b6, x: 0.0,  y: 1.5 },
      { c: 0x60a5fa, x: 0.4,  y: 1.2 },
      { c: 0x4ade80, x: -0.3, y: 0.9 },
      { c: 0xfbbf24, x: 0.5,  y: 0.85 },
      { c: 0xf472b6, x: -0.6, y: 0.8 },
    ];
    stickyColors.forEach(function(s) {
      var note = box(0.25, 0.25, 0.01, mat(s.c, { emissive: s.c, emissiveIntensity: 0.6 }));
      note.position.set(ox + s.x, s.y, oz - 1.71);
      note.rotation.z = (Math.random() - 0.5) * 0.15;
      scene.add(note);
    });

    // Table
    var tableTop = box(2.0, 0.08, 1.2, mat(0xdedede));
    tableTop.position.set(ox, 0.65, oz + 0.3);
    scene.add(tableTop);
    [[-0.85, -0.5], [0.85, -0.5], [-0.85, 0.5], [0.85, 0.5]].forEach(function(p) {
      var leg = cyl(0.05, 0.05, 0.55, 6, mat(0x999999));
      leg.position.set(ox + p[0], 0.35, oz + 0.3 + p[1]);
      scene.add(leg);
    });

    // Items on table
    // Notebook
    var nb = box(0.4, 0.04, 0.3, mat(0xfbbf24));
    nb.position.set(ox - 0.5, 0.72, oz + 0.3);
    nb.rotation.y = 0.15;
    scene.add(nb);
    // Pencil
    var pencil = cyl(0.015, 0.015, 0.35, 6, mat(0xffd700));
    pencil.position.set(ox - 0.15, 0.72, oz + 0.25);
    pencil.rotation.z = Math.PI / 2;
    scene.add(pencil);
    // Small idea cube (prototype)
    var proto = box(0.2, 0.2, 0.2, mat(0xe94560, { emissive: 0xe94560, emissiveIntensity: 0.5 }));
    proto.position.set(ox + 0.5, 0.8, oz + 0.3);
    scene.add(proto);

    // Chairs (2 stools)
    [-0.5, 0.5].forEach(function(dx) {
      var stoolSeat = cyl(0.2, 0.2, 0.06, 8, mat(0x555555));
      stoolSeat.position.set(ox + dx, 0.45, oz + 1.2);
      scene.add(stoolSeat);
      var stoolLeg = cyl(0.03, 0.04, 0.35, 6, mat(0x444444));
      stoolLeg.position.set(ox + dx, 0.24, oz + 1.2);
      scene.add(stoolLeg);
    });

    // Idea light bulb (floating)
    var bulb = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), mat(0xffd700, { emissive: 0xffd700, emissiveIntensity: 3.0 }));
    bulb.position.set(ox, 2.2, oz + 0.3);
    scene.add(bulb);
    var bulbGlow = new THREE.PointLight(0xffd700, 0.6, 8);
    bulbGlow.position.set(ox, 2.2, oz + 0.3);
    scene.add(bulbGlow);
    animatables.ideaBulb = bulb;
    animatables.ideaBulbLight = bulbGlow;
  })();

  // ── HALLWAY CENTER ────────────────────────────────────────
  (function() {
    // Coffee machine
    var coffeeBody = box(0.4, 0.6, 0.35, mat(0x222222));
    coffeeBody.position.set(-1.5, 0.42, 0);
    scene.add(coffeeBody);
    var coffeeTop = box(0.38, 0.1, 0.33, mat(0x333333));
    coffeeTop.position.set(-1.5, 0.75, 0);
    scene.add(coffeeTop);
    var coffeeBtn = box(0.06, 0.06, 0.01, mat(0xe94560, { emissive: 0xe94560, emissiveIntensity: 3.0 }));
    coffeeBtn.position.set(-1.5, 0.55, 0.18);
    scene.add(coffeeBtn);
    // Steam particles (small glowing cubes)
    for (var si = 0; si < 3; si++) {
      var steam = box(0.03, 0.03, 0.03, mat(0xffffff, { transparent: true, opacity: 0.3 }));
      steam.position.set(-1.5 + (Math.random() - 0.5) * 0.15, 0.85 + si * 0.1, 0);
      scene.add(steam);
      animatables.steamCubes.push(steam);
    }

    // Plant 1
    function makePlant(px, pz) {
      var pot = cyl(0.15, 0.12, 0.25, 8, mat(0xcc7744));
      pot.position.set(px, 0.25, pz);
      scene.add(pot);
      // Dirt
      var dirt = cyl(0.14, 0.14, 0.03, 8, mat(0x4a3520));
      dirt.position.set(px, 0.38, pz);
      scene.add(dirt);
      // Foliage layers
      var foliage1 = new THREE.Mesh(new THREE.SphereGeometry(0.22, 6, 6), mat(0x22c55e, { emissive: 0x22c55e, emissiveIntensity: 0.15 }));
      foliage1.position.set(px, 0.6, pz);
      scene.add(foliage1);
      var foliage2 = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 6), mat(0x16a34a, { emissive: 0x22c55e, emissiveIntensity: 0.1 }));
      foliage2.position.set(px + 0.08, 0.78, pz);
      scene.add(foliage2);
      var foliage3 = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.25, 6), mat(0x15803d));
      foliage3.position.set(px - 0.05, 0.85, pz + 0.05);
      scene.add(foliage3);
    }
    makePlant(1.3, -0.5);
    makePlant(1.5, 0.6);

    // Rug/mat
    var rug = box(1.8, 0.02, 1.0, mat(0x8B4513, { emissive: 0xffd700, emissiveIntensity: 0.05 }));
    rug.position.set(0, 0.12, 0);
    scene.add(rug);
    // Rug pattern (inner)
    var rugInner = box(1.4, 0.01, 0.6, mat(0xa0522d, { emissive: 0xe94560, emissiveIntensity: 0.05 }));
    rugInner.position.set(0, 0.14, 0);
    scene.add(rugInner);

    // Hallway lights (ceiling-ish glowing strips)
    [-3, 0, 3].forEach(function(z) {
      var strip = box(0.6, 0.04, 0.1, mat(0xffd700, { emissive: 0xffd700, emissiveIntensity: 0.8 }));
      strip.position.set(0, 2.8, z);
      scene.add(strip);
    });
    [-3, 0, 3].forEach(function(x) {
      var strip = box(0.1, 0.04, 0.6, mat(0xffd700, { emissive: 0xffd700, emissiveIntensity: 0.8 }));
      strip.position.set(x, 2.8, 0);
      scene.add(strip);
    });
  })();

  // ── ANIMATED CHARACTER ────────────────────────────────────
  var character = new THREE.Group();
  (function() {
    // Head
    var head = box(0.4, 0.4, 0.4, mat(0xffcc99));
    head.position.y = 1.5;
    character.add(head);
    // Eyes
    var eyeL = box(0.06, 0.06, 0.02, mat(0x222222));
    eyeL.position.set(-0.08, 1.48, 0.16);
    character.add(eyeL);
    var eyeR = box(0.06, 0.06, 0.02, mat(0x222222));
    eyeR.position.set(0.08, 1.48, 0.16);
    character.add(eyeR);
    // Hair
    var hair = box(0.42, 0.14, 0.42, mat(0x222222));
    hair.position.y = 1.74;
    character.add(hair);

    // Body
    var body = box(0.4, 0.5, 0.25, mat(0xffd700, { emissive: 0xffd700, emissiveIntensity: 0.1 }));
    body.position.y = 1.05;
    character.add(body);

    // Arms
    var armL = box(0.12, 0.45, 0.12, mat(0xffd700, { emissive: 0xffd700, emissiveIntensity: 0.1 }));
    armL.position.set(-0.3, 1.05, 0);
    character.add(armL);
    var armR = box(0.12, 0.45, 0.12, mat(0xffd700, { emissive: 0xffd700, emissiveIntensity: 0.1 }));
    armR.position.set(0.3, 1.05, 0);
    character.add(armR);

    // Legs
    var legL = box(0.14, 0.4, 0.14, mat(0x333333));
    legL.position.set(-0.1, 0.6, 0);
    character.add(legL);
    var legR = box(0.14, 0.4, 0.14, mat(0x333333));
    legR.position.set(0.1, 0.6, 0);
    character.add(legR);

    // Shoes
    var shoeL = box(0.15, 0.06, 0.2, mat(0xe94560));
    shoeL.position.set(-0.1, 0.4, 0.03);
    character.add(shoeL);
    var shoeR = box(0.15, 0.06, 0.2, mat(0xe94560));
    shoeR.position.set(0.1, 0.4, 0.03);
    character.add(shoeR);

    character.position.set(0, 0, 0);
    scene.add(character);
  })();

  // ── PARTICLE SYSTEM ───────────────────────────────────────
  var particles = [];
  var particleColors = [0xffd700, 0x22c55e, 0x64477d, 0x3b82f6, 0xe94560];
  for (var i = 0; i < 150; i++) {
    var size = 0.02 + Math.random() * 0.04;
    var pc = particleColors[Math.floor(Math.random() * particleColors.length)];
    var p = box(size, size, size, mat(pc, { emissive: pc, emissiveIntensity: 1.2, transparent: true, opacity: 0.5 + Math.random() * 0.4 }));
    p.position.set(
      (Math.random() - 0.5) * 28,
      Math.random() * 8,
      (Math.random() - 0.5) * 28
    );
    p.userData = {
      vx: (Math.random() - 0.5) * 0.005,
      vy: 0.003 + Math.random() * 0.008,
      vz: (Math.random() - 0.5) * 0.005,
      phase: Math.random() * Math.PI * 2
    };
    scene.add(p);
    particles.push(p);
  }

  // ── Simple orbit controls (manual) ────────────────────────
  var camAngle = Math.PI / 4;
  var camPitch = 0.85; // radians from horizontal
  var camDist = 14;
  var isDragging = false;
  var lastMouse = { x: 0, y: 0 };
  var targetAngle = camAngle;
  var targetPitch = camPitch;
  var targetDist = camDist;

  renderer.domElement.addEventListener('mousedown', function(e) {
    isDragging = true;
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;
  });
  window.addEventListener('mouseup', function() { isDragging = false; });
  window.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    var dx = e.clientX - lastMouse.x;
    var dy = e.clientY - lastMouse.y;
    targetAngle -= dx * 0.005;
    targetPitch = Math.max(0.3, Math.min(1.4, targetPitch + dy * 0.005));
    lastMouse.x = e.clientX;
    lastMouse.y = e.clientY;
  });
  renderer.domElement.addEventListener('wheel', function(e) {
    targetDist = Math.max(8, Math.min(35, targetDist + e.deltaY * 0.02));
    e.preventDefault();
  }, { passive: false });

  // Touch support
  renderer.domElement.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      isDragging = true;
      lastMouse.x = e.touches[0].clientX;
      lastMouse.y = e.touches[0].clientY;
    }
  });
  window.addEventListener('touchend', function() { isDragging = false; });
  window.addEventListener('touchmove', function(e) {
    if (!isDragging || e.touches.length !== 1) return;
    var dx = e.touches[0].clientX - lastMouse.x;
    var dy = e.touches[0].clientY - lastMouse.y;
    targetAngle -= dx * 0.005;
    targetPitch = Math.max(0.3, Math.min(1.4, targetPitch + dy * 0.005));
    lastMouse.x = e.touches[0].clientX;
    lastMouse.y = e.touches[0].clientY;
  });

  // ── Animation Loop ────────────────────────────────────────
  var clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    var t = clock.getElapsedTime();

    // Smooth camera orbit
    camAngle += (targetAngle - camAngle) * 0.08;
    camPitch += (targetPitch - camPitch) * 0.08;
    camDist += (targetDist - camDist) * 0.08;

    var camBobY = Math.sin(t * 1.57) * 0.05;
    camera.position.x = Math.cos(camAngle) * Math.cos(camPitch) * camDist;
    camera.position.y = Math.sin(camPitch) * camDist + camBobY;
    camera.position.z = Math.sin(camAngle) * Math.cos(camPitch) * camDist;
    camera.lookAt(0, 1, 0);

    // Character idle animation
    character.position.y = Math.sin(t * 3.14) * 0.15;
    character.rotation.y = Math.sin(t * 0.5) * 0.3;

    // Particles
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      var ud = p.userData;
      p.position.x += ud.vx + Math.sin(t * 0.5 + ud.phase) * 0.002;
      p.position.y += ud.vy;
      p.position.z += ud.vz + Math.cos(t * 0.5 + ud.phase) * 0.002;
      p.rotation.x = t * 0.5 + ud.phase;
      p.rotation.y = t * 0.3 + ud.phase;
      if (p.position.y > 8) {
        p.position.y = -0.5;
        p.position.x = (Math.random() - 0.5) * 28;
        p.position.z = (Math.random() - 0.5) * 28;
      }
    }

    // Subtle pulsing on green point light
    pointGreen.intensity = 0.5 + Math.sin(t * 2) * 0.15;

    // Animate LIVE dots (blink)
    animatables.liveDots.forEach(function(dot) {
      dot.material.emissiveIntensity = 3.0 + Math.sin(t * 4) * 2.0;
    });

    // Animate steam (drift up and reset)
    animatables.steamCubes.forEach(function(s, i) {
      s.position.y = 0.85 + ((t * 0.3 + i * 0.3) % 0.5);
      s.material.opacity = 0.4 - ((t * 0.3 + i * 0.3) % 0.5) * 0.6;
    });

    // Animate idea bulb (pulse)
    if (animatables.ideaBulb) {
      animatables.ideaBulb.material.emissiveIntensity = 2.0 + Math.sin(t * 2) * 1.0;
      animatables.ideaBulbLight.intensity = 0.4 + Math.sin(t * 2) * 0.2;
    }

    // Animate scanline (scroll)
    if (animatables.scanline) {
      animatables.scanline.position.y = 1.0 + ((t * 0.5) % 0.5);
    }

    // Project room labels to screen space
    var labelData = [
      { id: 'label-myroom', pos: new THREE.Vector3(cx.tl.x, 2.5, cx.tl.z) },
      { id: 'label-product', pos: new THREE.Vector3(cx.tr.x, 2.5, cx.tr.z) },
      { id: 'label-book', pos: new THREE.Vector3(cx.bl.x, 2.5, cx.bl.z) },
      { id: 'label-idealab', pos: new THREE.Vector3(cx.br.x, 2.5, cx.br.z) },
    ];
    labelData.forEach(function(l) {
      var projected = l.pos.clone().project(camera);
      var el = document.getElementById(l.id);
      if (el) {
        var x = (projected.x * 0.5 + 0.5) * window.innerWidth;
        var y = (-projected.y * 0.5 + 0.5) * window.innerHeight;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.transform = 'translate(-50%, -50%)';
        el.style.display = projected.z > 1 ? 'none' : 'block';
      }
    });

    renderer.render(scene, camera);
  }

  // ── Resize ────────────────────────────────────────────────
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── Hide loading ──────────────────────────────────────────
  document.getElementById('loading').classList.add('hidden');
  setTimeout(function() {
    document.getElementById('loading').style.display = 'none';
  }, 700);

  // Start
  animate();
})();
</script>
</body>
</html>
